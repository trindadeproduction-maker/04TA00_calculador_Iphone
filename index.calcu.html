<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="calculadora">
        <table>
            <tr>
                <td colspan="4"> <input type = "text" class="display" readonly> </td>
            </tr>

            <tr>
                <td><button class="light_grey" data-value="AC">AC</button></td>
                <td><button class="light_grey" data-value="+/-">+/-</button></td>
                <td><button class="light_grey" data-value="%">%</button></td>
                <td><button class="orange_button" data-value="/">/</button></td>
            </tr>

            <tr>
                <td><button class="dark_button" data-value="7">7</button></td>
                <td><button class="dark_button" data-value="8">8</button></td>
                <td><button class="dark_button" data-value="9">9</button></td>
                <td><button class="orange_button" data-value="*">x</button></td>
            </tr>

            <tr>
                <td><button class="dark_button" data-value="4">4</button></td>
                <td><button class="dark_button" data-value="5">5</button></td>
                <td><button class="dark_button" data-value="6">6</button></td>
                <td><button class="orange_button" data-value="-">-</button></td>
            </tr>

            <tr>
                <td><button class="dark_button" data-value="1">1</button></td>
                <td><button class="dark_button" data-value="2">2</button></td>
                <td><button class="dark_button" data-value="3">3</button></td>
                <td><button class="orange_button" data-value="+">+</button></td>
            </tr>

            <tr>
                <td colspan="2">
                    <button class="cero_button dark_button" data-value="0">0</button>
                </td>

                <td><button class="dark_button" data-value=".">.</button></td>
                <td><button class="orange_button" data-value="=">=</button></td>
            </tr>

            <!-- pendiente - fase 2 <tr>
                <td><button class="orange_button" data-value="*2"> x2 </button></td>
                <td><button class="orange_button" data-value="*3"> x3 </button></td>
                <td><button class="orange_button" data-value="PI"> PI </button></td>
                <td><button class="orange_button" data-value="√"> √ </button></td>
            </tr> -->
        </table>
    </div>

    <script src="./script.js"></script>
</body>

</html>
